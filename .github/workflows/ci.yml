name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pinned Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Run test suite
        run: bun test

      - name: Run coverage
        run: bun test --coverage

      - name: Verify JavaScript and manifest syntax
        run: bun test tests/syntax.test.js
